<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c52c3e;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#df2f45;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bgGradient)" filter="url(#shadow)"/>
  <g transform="translate(24, 20)">
    <rect x="8" y="16" width="64" height="56" rx="6" ry="6" fill="url(#iconGradient)"/>
    <rect x="8" y="16" width="64" height="16" rx="6" ry="6" fill="url(#accentGradient)"/>
    <rect x="8" y="24" width="64" height="8" fill="url(#accentGradient)"/>
    <rect x="20" y="8" width="4" height="16" rx="2" ry="2" fill="url(#iconGradient)"/>
    <rect x="56" y="8" width="4" height="16" rx="2" ry="2" fill="url(#iconGradient)"/>
    <line x1="16" y1="40" x2="64" y2="40" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="16" y1="48" x2="64" y2="48" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="16" y1="56" x2="64" y2="56" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="24" cy="44" r="2" fill="#c52c3e"/>
    <circle cx="32" cy="44" r="2" fill="#64748b"/>
    <circle cx="40" cy="44" r="2" fill="#64748b"/>
    <circle cx="48" cy="44" r="2" fill="#64748b"/>
    <circle cx="24" cy="52" r="2" fill="#64748b"/>
    <circle cx="32" cy="52" r="2" fill="#ef4444"/>
    <circle cx="40" cy="52" r="2" fill="#10b981"/>
    <circle cx="48" cy="52" r="2" fill="#64748b"/>
    <circle cx="24" cy="60" r="2" fill="#64748b"/>
    <circle cx="32" cy="60" r="2" fill="#64748b"/>
    <circle cx="40" cy="60" r="2" fill="#f59e0b"/>
  </g>
  <g transform="translate(75, 75)">
    <circle cx="16" cy="16" r="14" fill="url(#accentGradient)" filter="url(#shadow)"/>
    <circle cx="16" cy="16" r="11" fill="url(#iconGradient)"/>
    <line x1="16" y1="16" x2="16" y2="8" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="22" y2="16" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="16" cy="16" r="1.5" fill="#374151"/>
  </g>
  <circle cx="100" cy="28" r="8" fill="#ef4444" filter="url(#shadow)"/>
  <circle cx="100" cy="28" r="6" fill="#ffffff"/>
  <text x="100" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ef4444">!</text>
</svg>