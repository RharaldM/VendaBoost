<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Automation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Marketplace Automation</h1>
            <p>Ferramenta de automação para publicação de produtos</p>
        </header>

        <main class="main">
            <div class="alert alert-success" id="successAlert">
                ✅ Item enviado com sucesso! A automação foi iniciada.
            </div>
            
            <div class="alert alert-error" id="errorAlert">
                ❌ Erro ao enviar item. Tente novamente.
            </div>

            <!-- Progress Bar -->
            <div id="progressBar" class="progress-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <section class="form-section">
                <form id="marketplaceForm" class="marketplace-form">
                    <div class="form-group">
                        <label for="title" class="form-label">Título do Produto</label>
                        <input type="text" id="title" class="form-control" placeholder="Ex: iPhone 13 Pro Max 256GB" required>
                        <div class="error-message" id="titleError"></div>
                    </div>

                    <div class="row">
                        <div class="col col-6">
                            <div class="form-group">
                                <label for="price" class="form-label">Preço (R$)</label>
                                <input type="number" id="price" class="form-control" placeholder="0,00" step="0.01" min="0" required>
                                <div class="error-message" id="priceError"></div>
                            </div>
                        </div>
                        <div class="col col-6">
                            <div class="form-group">
                                <label for="location" class="form-label">Localização</label>
                                <input type="text" id="location" class="form-control" placeholder="Ex: São Paulo, SP" required>
                                <div class="error-message" id="locationError"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description" class="form-label">Descrição</label>
                        <textarea id="description" class="form-control" rows="4" placeholder="Descreva seu produto em detalhes..." required></textarea>
                        <div class="error-message" id="descriptionError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Foto do Produto</label>
                        <div class="file-upload">
                            <input type="file" id="photo" accept="image/*" required>
                            <label for="photo" class="file-upload-label">
                                <span class="upload-icon">📷</span>
                                <div class="file-upload-text">
                                    Clique para selecionar ou arraste uma imagem
                                    <small>PNG, JPG até 5MB</small>
                                </div>
                            </label>
                        </div>
                        <div class="file-selected" id="fileSelected">
                            <div class="file-info">
                                <span class="file-name"></span>
                                <span class="file-size"></span>
                            </div>
                            <div class="file-actions">
                                <button type="button" class="file-action" onclick="document.getElementById('photo').click()">Substituir</button>
                                <button type="button" class="file-action" onclick="clearFile()">Remover</button>
                            </div>
                        </div>
                        <div class="error-message" id="photoError"></div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn--primary">Publicar no Marketplace</button>
                </form>
            </section>

            <!-- Seção de Logs em Tempo Real -->
            <section class="logs-section">
                <div class="logs-header">
                    <h2>Logs da Automação</h2>
                    <div class="logs-controls">
                        <button id="clearLogsBtn" class="btn btn--secondary">Limpar Logs</button>
                        <button id="toggleLogsBtn" class="btn btn--secondary">Minimizar</button>
                        <div class="connection-status">
                            <span id="connectionStatus" class="status-indicator offline">Desconectado</span>
                        </div>
                    </div>
                </div>
                <div class="logs-container" id="logsContainer">
                    <div class="logs-content" id="logsContent">
                        <div class="log-entry log-info">
                            <span class="log-timestamp">[Aguardando...]</span>
                            <span class="log-message">Sistema de logs inicializando...</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Socket.IO Client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
