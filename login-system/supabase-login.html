<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendaBoost - Supabase Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            line-height: 1.6;
        }

        .auth-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .auth-header::before {
            content: '🚀';
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 2px 4px rgba(102, 126, 234, 0.3));
        }

        .auth-header h1 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .brand-subtitle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .version-info {
            font-size: 0.75rem;
            color: #6c757d;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #495057;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fafbfc;
            color: #495057;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        input[type="email"]:hover,
        input[type="password"]:hover {
            border-color: #667eea;
            background: white;
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: none;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 117, 125, 0.3);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            font-weight: 500;
            font-size: 0.9rem;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .alert-success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid rgba(21, 87, 36, 0.2);
        }

        .alert-success::before {
            content: '✅';
            margin-right: 0.5rem;
        }

        .alert-error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid rgba(114, 28, 36, 0.2);
        }

        .alert-error::before {
            content: '❌';
            margin-right: 0.5rem;
        }

        .alert-info {
            background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%);
            color: #0c5460;
            border: 1px solid rgba(12, 84, 96, 0.2);
        }

        .alert-info::before {
            content: 'ℹ️';
            margin-right: 0.5rem;
        }

        .toggle-form {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e9ecef;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .toggle-form a:hover {
            transform: translateY(-1px);
            text-shadow: 0 2px 4px rgba(102, 126, 234, 0.2);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 1.5rem 0;
            padding: 1rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 8px;
            font-weight: 500;
            color: #495057;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 0.75rem;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .auth-branding {
            text-align: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }

        .auth-container {
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem;
                margin: 1rem;
            }
            
            .auth-header h1 {
                font-size: 1.5rem;
            }
            
            .btn {
                padding: 1rem 1.5rem;
            }
        }

        .supabase-info {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(139, 195, 74, 0.1) 100%);
            border: 1px solid rgba(76, 175, 80, 0.2);
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #2e7d32;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-branding">
            <div class="auth-header">
                <h1>VendaBoost</h1>
                <div class="brand-subtitle">Facebook Marketplace Automation</div>
                <p>Sistema de Autenticação Supabase</p>
                <div class="version-info">v1.2.4 • Powered by Supabase</div>
            </div>
        </div>

        <div class="supabase-info">
            🔒 Autenticação segura com Supabase
        </div>

        <div id="alert" class="alert"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <span>Processando...</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email:</label>
                <input type="email" id="loginEmail" name="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">Senha:</label>
                <input type="password" id="loginPassword" name="password" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn btn-primary">Entrar no VendaBoost</button>
        </form>

        <!-- Register Form (hidden by default) -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="registerEmail">Email:</label>
                <input type="email" id="registerEmail" name="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="registerPassword">Senha:</label>
                <input type="password" id="registerPassword" name="password" required placeholder="Crie uma senha segura (mín. 6 caracteres)">
            </div>
            <button type="submit" class="btn btn-primary">Criar Conta</button>
        </form>

        <div class="toggle-form">
            <a href="#" id="toggleForm">Não tem uma conta? Registre-se aqui</a>
        </div>
    </div>

    <script type="module">
        // Supabase configuration
        const SUPABASE_URL = 'https://xcjrvacqztpjsuoweztr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjanJ2YWNxenRwanN1b3dlenRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ0NDU5NDcsImV4cCI6MjA3MDAyMTk0N30.N0ks34HGzaQQxyoMDK1a0lDUzVo577AuILNd_QM-9H4';

        const headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
        };

        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleFormLink = document.getElementById('toggleForm');
        const alertDiv = document.getElementById('alert');
        const loadingDiv = document.getElementById('loading');

        let isLoginMode = true;

        // Toggle between login and register forms
        toggleFormLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggleFormLink.textContent = "Não tem uma conta? Registre-se aqui";
                document.querySelector('.auth-header p').textContent = 'Entre para acessar sua extensão';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggleFormLink.textContent = 'Já tem uma conta? Entre aqui';
                document.querySelector('.auth-header p').textContent = 'Crie uma nova conta';
            }
            hideAlert();
        });

        // Show alert message
        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
        }

        // Hide alert message
        function hideAlert() {
            alertDiv.style.display = 'none';
        }

        // Show/hide loading
        function setLoading(show) {
            loadingDiv.style.display = show ? 'block' : 'none';
        }

        // Handle login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            setLoading(true);

            const formData = new FormData(loginForm);
            const email = formData.get('email');
            const password = formData.get('password');

            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok && result.access_token) {
                    showAlert('Login realizado com sucesso! Você pode fechar esta janela.', 'success');
                    
                    // Store authentication data for extension use
                    const authData = {
                        access_token: result.access_token,
                        refresh_token: result.refresh_token,
                        user: result.user,
                        expires_at: new Date(Date.now() + (result.expires_in * 1000)).toISOString()
                    };

                    // Method 1: Try chrome.runtime API (if available)
                    if (window.chrome && chrome.runtime && chrome.runtime.sendMessage) {
                        try {
                            chrome.runtime.sendMessage({
                                type: 'SUPABASE_LOGIN_SUCCESS',
                                authData: authData
                            }, (response) => {
                                if (chrome.runtime.lastError) {
                                    console.log('Runtime error:', chrome.runtime.lastError);
                                } else {
                                    console.log('Message sent to extension:', response);
                                }
                            });
                        } catch (error) {
                            console.log('Chrome runtime not available:', error);
                        }
                    }
                    
                    // Method 2: Store in chrome.storage (if available)
                    if (window.chrome && chrome.storage && chrome.storage.local) {
                        try {
                            chrome.storage.local.set({
                                vendaboost_access_token: result.access_token,
                                vendaboost_refresh_token: result.refresh_token,
                                vendaboost_user_data: result.user,
                                vendaboost_token_expires: authData.expires_at,
                                vendaboost_last_auth_check: Date.now()
                            }, () => {
                                if (chrome.runtime.lastError) {
                                    console.log('Storage error:', chrome.runtime.lastError);
                                } else {
                                    console.log('Auth data stored in chrome.storage');
                                }
                            });
                        } catch (error) {
                            console.log('Chrome storage not available:', error);
                        }
                    }
                    
                    // Method 3: Fallback to localStorage
                    try {
                        localStorage.setItem('vendaboost_access_token', result.access_token);
                        localStorage.setItem('vendaboost_refresh_token', result.refresh_token);
                        localStorage.setItem('vendaboost_user_data', JSON.stringify(result.user));
                        localStorage.setItem('vendaboost_token_expires', authData.expires_at);
                        localStorage.setItem('vendaboost_last_auth_check', Date.now().toString());
                        console.log('Auth data stored in localStorage');
                    } catch (error) {
                        console.log('localStorage not available:', error);
                    }

                    // Show success message and auto close
                    setTimeout(() => {
                        showAlert('Redirecionando para a extensão...', 'success');
                        setTimeout(() => {
                            window.close();
                        }, 1000);
                    }, 1500);
                } else {
                    showAlert(result.error_description || result.message || 'Falha no login');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Erro de conexão. Tente novamente.');
            } finally {
                setLoading(false);
            }
        });

        // Handle register form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            setLoading(true);

            const formData = new FormData(registerForm);
            const email = formData.get('email');
            const password = formData.get('password');

            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Registro realizado com sucesso! Verifique seu email para confirmar a conta.', 'info');
                    registerForm.reset();
                    
                    // Switch to login form after successful registration
                    setTimeout(() => {
                        toggleFormLink.click();
                    }, 3000);
                } else {
                    showAlert(result.message || 'Falha no registro');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Erro de conexão. Tente novamente.');
            } finally {
                setLoading(false);
            }
        });

        // Handle messages from extension
        window.addEventListener('message', (event) => {
            if (event.data.type === 'CHECK_AUTH') {
                const accessToken = localStorage.getItem('vendaboost_access_token');
                const user = localStorage.getItem('vendaboost_user_data');
                
                event.source.postMessage({
                    type: 'AUTH_STATUS',
                    authenticated: !!accessToken,
                    token: accessToken,
                    user: user ? JSON.parse(user) : null
                }, event.origin);
            }
        });
    </script>
</body>
</html>
