version: '3.8'

services:
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: marketplace-backend-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
      - LOG_DIR=/app/logs
      - MAX_FILE_SIZE=10485760
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/uploads:/app/uploads
      - ./data/logs:/app/logs
      - ./data/sessions:/app/sessions
    networks:
      - marketplace-network
    command: npm run dev

  web-portal-dev:
    build:
      context: ./web-portal
      dockerfile: Dockerfile.dev
    container_name: marketplace-web-portal-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
      - VITE_SOCKET_URL=http://localhost:3001
    volumes:
      - ./web-portal:/app
      - /app/node_modules
    networks:
      - marketplace-network
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend-dev

networks:
  marketplace-network:
    driver: bridge